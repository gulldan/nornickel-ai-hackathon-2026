apiVersion: v1
kind: Secret
metadata:
  name: archive-scan-secrets
type: Opaque
stringData:
  postgres-url: "postgresql://archive_scan:<postgres-password>@postgres:5432/archive_scan"
  s3-access-key-id: "<s3-access-key-id>"
  s3-secret-access-key: "<s3-secret-access-key>"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: archive-scan-config
data:
  ARCHIVE_SCAN_SERVICE_ADDR: 0.0.0.0:3000
  ARCHIVE_SCAN_OBJECT_SOURCE_MAX_BYTES: "1073741824"
  ARCHIVE_SCAN_OBJECT_SOURCE_TEMP_DIR: /tmp/archive-scan/object-source
  ARCHIVE_SCAN_JOB_STORE_BACKEND: postgres
  ARCHIVE_SCAN_JOB_STORE_POSTGRES_TABLE_PREFIX: archive_scan_jobs
  ARCHIVE_SCAN_RESULT_STORE_BACKEND: s3
  ARCHIVE_SCAN_RESULT_STORE_S3_ENDPOINT: http://seaweedfs:8333
  ARCHIVE_SCAN_RESULT_STORE_S3_REGION: us-east-1
  ARCHIVE_SCAN_RESULT_STORE_S3_BUCKET: archive-results
  ARCHIVE_SCAN_RESULT_STORE_S3_KEY_PREFIX: results
  ARCHIVE_SCAN_RESULT_STORE_S3_PATH_STYLE: "true"
  ARCHIVE_SCAN_EXTRACT_STORE_BACKEND: s3
  ARCHIVE_SCAN_EXTRACT_STORE_S3_ENDPOINT: http://seaweedfs:8333
  ARCHIVE_SCAN_EXTRACT_STORE_S3_REGION: us-east-1
  ARCHIVE_SCAN_EXTRACT_STORE_S3_BUCKET: archives
  ARCHIVE_SCAN_EXTRACT_STORE_S3_KEY_PREFIX: extracted
  ARCHIVE_SCAN_EXTRACT_STORE_S3_PATH_STYLE: "true"
  ARCHIVE_SCAN_EXTRACT_STORE_TEMP_DIR: /tmp/archive-scan/extract
  ARCHIVE_SCAN_EXTRACT_METADATA_BACKEND: postgres
  ARCHIVE_SCAN_EXTRACT_METADATA_POSTGRES_TABLE_PREFIX: archive_scan_extract
  ARCHIVE_SCAN_EXTRACT_METADATA_BATCH_SIZE: "500"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: archive-scan
  labels:
    app.kubernetes.io/name: archive-scan
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: archive-scan
  template:
    metadata:
      labels:
        app.kubernetes.io/name: archive-scan
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: archive-scan
          image: archive-scan:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: archive-scan-config
          env:
            - name: ARCHIVE_SCAN_JOB_STORE_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: archive-scan-secrets
                  key: postgres-url
            - name: ARCHIVE_SCAN_EXTRACT_METADATA_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: archive-scan-secrets
                  key: postgres-url
            - name: ARCHIVE_SCAN_RESULT_STORE_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: archive-scan-secrets
                  key: s3-access-key-id
            - name: ARCHIVE_SCAN_RESULT_STORE_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: archive-scan-secrets
                  key: s3-secret-access-key
            - name: ARCHIVE_SCAN_EXTRACT_STORE_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: archive-scan-secrets
                  key: s3-access-key-id
            - name: ARCHIVE_SCAN_EXTRACT_STORE_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: archive-scan-secrets
                  key: s3-secret-access-key
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: archive-scan
  labels:
    app.kubernetes.io/name: archive-scan
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: archive-scan
  ports:
    - name: http
      port: 80
      targetPort: http
