# API gateway. Terminates client traffic and routes to the auth and main
# services. TLS is omitted for local dev (terminate here in production by adding a
# `listen 443 ssl;` server with certs). WebSocket upgrade is handled inline.
#
# Upstreams are resolved at REQUEST time via Docker's embedded DNS (proxy_pass
# with a variable), so nginx starts even before the app containers register and
# survives their restarts — a static `upstream {}` block would crash on boot.

worker_processes auto;
events { worker_connections 1024; }

http {
    access_log /dev/stdout;
    error_log  /dev/stderr warn;
    server_tokens off;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types application/json text/plain text/csv;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    resolver 127.0.0.11 ipv6=off valid=10s;

    # Брутфорс логина: ключ — реальный IP клиента из X-Forwarded-For (его
    # перезаписывает фронт-nginx). Пустой ключ (внутренние вызовы) не лимитируется.
    limit_req_zone $http_x_forwarded_for zone=auth:10m rate=30r/m;
    # Общий потолок на API: один клиент не должен забивать генерацию/загрузки для
    # остальных судей. Тот же ключ — реальный IP из XFF. Бёрст покрывает обычную
    # пачку вызовов при загрузке страницы; устойчивый флуд режется до 10 r/s.
    limit_req_zone $http_x_forwarded_for zone=api:10m rate=10r/s;
    limit_req_status 429;

    server {
        listen 80;
        server_name _;

        # Согласован с MAX_UPLOAD_MB main-service (+ запас на multipart-обвязку).
        client_max_body_size 600m;
        proxy_read_timeout 300s;
        proxy_set_header Host              $host;
        # Реальный IP клиента (его пишет фронт-nginx в XFF), а не адрес контейнера
        # фронта. Иначе throttle логина в auth ключуется по константе → один
        # атакующий может держать залоченными admin/expert/jury для всех судей.
        proxy_set_header X-Real-IP         $http_x_forwarded_for;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location = /healthz {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # Auth: /api/v1/auth/login -> auth:8080/login
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            set $auth_upstream http://auth:8080;
            rewrite ^/api/v1/auth/(.*)$ /$1 break;
            proxy_pass $auth_upstream;
        }

        # Everything else incl. /api/v1/ws: /api/v1/documents -> main-service:8080/documents
        location /api/v1/ {
            limit_req zone=api burst=40 nodelay;
            set $main_upstream http://main-service:8080;
            rewrite ^/api/v1/(.*)$ /$1 break;
            proxy_pass $main_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
