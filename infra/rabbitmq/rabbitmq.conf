# Платформенные настройки поверх дефолтов образа.
#
# consumer_timeout: окно подтверждения доставки. Распаковка архива в
# 10-150 ГБ занимает десятки минут — дефолтные 30 минут убивали бы доставку
# посреди работы и зацикливали редоставку. 2 часа покрывают худший случай;
# упавший воркер всё равно вернёт сообщение в очередь немедленно (канал
# закрывается).
consumer_timeout = 7200000
